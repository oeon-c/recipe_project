version: '3.3'

services:
  db:
    image: mariadb:10.11
    container_name: recipe_mariadb
    restart: always
    command: --secure-file-priv=""
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: recipe_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - recipe_network

  web:
    build: .
    container_name: recipe_flask
    restart: always
    ports:
      - "5000:80"  # Nginx가 80번 포트를 쓰므로 컨테이너의 80번을 호스트의 5000번으로 연결
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=recipe_db
    volumes:
      - .:/app
    depends_on:
      - db
    networks:
      - recipe_network

volumes:
  db_data:

networks:
  recipe_network:
